<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8" />
  <title>סנייק</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css" />
  <link rel="shortcut icon" href="/projects-pages/snake - Game/snake favicon.jpeg">
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
</head>

<body onload="createBoard()" dir="rtl">
  <h1>Snake Game</h1>

  <div class="centerTimerattemps">
    <p>attempts: <b class="counter">0</b></p>
    <p>
      <span style="color: black;" class="margin"></span> Timer:
      <b class="timer">00:00</b>
    </p>
  </div>

  <div class="frame">
    <div class="board"></div>
  </div>

  <audio id="gameOverAudio" preload="auto" volume="0.1">
    <source src="Country_Blues.ogg" type="audio/ogg">
    <source src="Country_Blues.mp3" type="audio/mpeg">
    Your browser does not support the audio element.
  </audio>

  <script src="/projects-pages/snake - Game/JS/Directions.js"></script>
  <script src="/projects-pages/snake - Game/JS/main.js"></script>
  <script src="/projects-pages/snake - Game/JS/SnakeColor.js"></script>
  <script src="/projects-pages/snake - Game/JS/Timer.js"></script>
</body>

</html>
